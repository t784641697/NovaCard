# VCC Hub 日志轮转配置
# 路径: /etc/logrotate.d/vcc-hub (部署到 Vultr)
# 触发: 由 /etc/cron.daily/logrotate 每天自动执行

# ── 1. PM2 日志 (cluster 模式: 带 -0/-1 后缀) ──
# 关键: 用 copytruncate (不发送信号), PM2 持有文件描述符
/root/.pm2/logs/vcc-hub-*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    extension .log
    create 0640 root root
    sharedscripts
}

/opt/vcc-hub/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
    extension .log
    create 0640 root root
    sharedscripts
}

/var/log/novacard-*.log {
    weekly
    rotate 4
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
    extension .log
    create 0640 root root
    sharedscripts
}
