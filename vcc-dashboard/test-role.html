<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试用户角色和按钮显示</title>
<style>
body {
  background: #0b0d17;
  color: #e8eaf6;
  font-family: sans-serif;
  padding: 20px;
}
.test-section {
  background: #1e253a;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
  border: 1px solid rgba(255,255,255,.07);
}
.cm-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
  white-space: nowrap;
}
.cm-btn-detail {
  background: rgba(79,143,255,.1);
  color: #4f8fff;
  border: 1px solid rgba(79,143,255,.2);
}
.cm-btn-detail:hover {
  background: rgba(79,143,255,.22);
}
</style>
</head>
<body>
<h2>测试用户角色和按钮显示问题</h2>

<div class="test-section">
  <h3>测试1: 直接测试_me?.role === 'admin'</h3>
  <div id="test1"></div>
</div>

<div class="test-section">
  <h3>测试2: 测试localStorage中的用户数据</h3>
  <div id="test2"></div>
</div>

<div class="test-section">
  <h3>测试3: 模拟实际卡片管理按钮生成</h3>
  <div id="test3"></div>
</div>

<div class="test-section">
  <h3>测试4: 检查window.showAdminCardDetail函数</h3>
  <div id="test4"></div>
</div>

<script>
// 从localStorage读取用户数据
const storedMe = localStorage.getItem('vcc_me');
const parsedMe = storedMe ? JSON.parse(storedMe) : null;

// 测试1: 直接测试条件
const test1Div = document.getElementById('test1');
test1Div.innerHTML = `
  <div>localStorage中的vcc_me: ${storedMe ? '有数据' : '无数据'}</div>
  <div>解析后的用户对象: ${JSON.stringify(parsedMe)}</div>
  <div>用户角色: ${parsedMe?.role || '未定义'}</div>
  <div>条件判断: parsedMe?.role === 'admin' = ${parsedMe?.role === 'admin'}</div>
`;

// 测试2: 模拟从后端API获取的用户数据
const mockApiUser = {
  id: 1,
  email: 'admin@vcc.hub',
  name: '管理员',
  role: 'admin',
  created_at: '2026-03-25T10:00:00.000Z'
};

const test2Div = document.getElementById('test2');
test2Div.innerHTML = `
  <div>模拟API返回的用户数据: ${JSON.stringify(mockApiUser)}</div>
  <div>mockApiUser.role: ${mockApiUser.role}</div>
  <div>条件判断: mockApiUser?.role === 'admin' = ${mockApiUser?.role === 'admin'}</div>
`;

// 测试3: 模拟卡片管理按钮生成
const mockCard = {
  card_id: 'XR2037150794163163136',
  card_number: '1111111262391666',
  cvv: '123',
  expire: '07/28',
  available_amount: '30.00',
  status: 'ACTIVE'
};

// 使用实际页面的用户对象
let _me = parsedMe || mockApiUser; // 优先使用实际存储的用户数据

const buttonHtml = _me?.role === 'admin' 
  ? `<button class="cm-btn cm-btn-detail" onclick="window.showAdminCardDetail('${mockCard.card_id}')">🔍 详情</button>`
  : '';

const test3Div = document.getElementById('test3');
test3Div.innerHTML = `
  <div>使用的用户对象: ${JSON.stringify(_me)}</div>
  <div>用户角色: ${_me?.role}</div>
  <div>条件判断结果: ${_me?.role === 'admin'}</div>
  <div>生成的按钮HTML: <pre>${escapeHtml(buttonHtml) || '(无按钮 - 非管理员)'}</pre></div>
  <div>实际按钮显示: ${buttonHtml || '无按钮'}</div>
`;

// 测试4: 检查全局函数
const test4Div = document.getElementById('test4');
test4Div.innerHTML = `
  <div>window.showAdminCardDetail 类型: ${typeof window.showAdminCardDetail}</div>
  <div>window.cmRechargeCard 类型: ${typeof window.cmRechargeCard}</div>
  <div>window.cmFreezeCard 类型: ${typeof window.cmFreezeCard}</div>
`;

// HTML转义函数
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 创建全局函数以便测试
window.showAdminCardDetail = function(cardId) {
  alert('测试: 显示卡片详情，卡片ID: ' + cardId);
};

window.cmRechargeCard = function(cardId) {
  alert('测试: 充值卡片，卡片ID: ' + cardId);
};

window.cmFreezeCard = function(cardId, status) {
  alert('测试: 冻结/解冻卡片，卡片ID: ' + cardId + ', 目标状态: ' + status);
};
</script>
</body>
</html>
