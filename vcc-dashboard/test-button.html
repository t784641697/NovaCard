<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试按钮显示</title>
<style>
/* 模拟卡片管理按钮样式 */
.cm-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
  white-space: nowrap;
}
.cm-btn-detail {
  background: rgba(79,143,255,.1);
  color: #4f8fff;
  border: 1px solid rgba(79,143,255,.2);
}
.cm-btn-detail:hover {
  background: rgba(79,143,255,.22);
}
.cm-card {
  background: #1e253a;
  border-radius: 16px;
  padding: 20px;
  margin: 20px;
  border: 1px solid rgba(255,255,255,.07);
}
</style>
</head>
<body style="background: #0b0d17; color: #e8eaf6; font-family: sans-serif; padding: 20px;">
  <h2>测试管理员详情按钮显示</h2>
  
  <div class="cm-card">
    <h3>模拟卡片管理界面</h3>
    
    <!-- 模拟管理员角色 -->
    <div>
      <h4>场景1: 管理员用户 (role='admin')</h4>
      <div id="adminDemo"></div>
    </div>
    
    <!-- 模拟普通用户角色 -->
    <div style="margin-top: 30px;">
      <h4>场景2: 普通用户 (role='user')</h4>
      <div id="userDemo"></div>
    </div>
  </div>
  
  <div style="margin-top: 40px; padding: 20px; background: #161929; border-radius: 12px;">
    <h3>调试信息</h3>
    <div id="debug"></div>
  </div>

<script>
// 模拟用户对象
const adminUser = {
  id: 1,
  email: 'admin@vcc.hub',
  role: 'admin',
  name: '管理员'
};

const normalUser = {
  id: 2,
  email: 'user@vcc.hub',
  role: 'user',
  name: '普通用户'
};

// 模拟卡片数据
const mockCard = {
  card_id: 'XR2037150794163163136',
  card_number: '1111111262391666',
  cvv: '123',
  expire: '07/28',
  available_amount: '30.00',
  status: 'ACTIVE'
};

// 测试函数
function testButtonGeneration(user, containerId) {
  const container = document.getElementById(containerId);
  const isAdmin = user?.role === 'admin';
  const buttonHtml = isAdmin 
    ? `<button class="cm-btn cm-btn-detail" onclick="alert('这是管理员详情按钮，卡片ID: ${mockCard.card_id}')">🔍 详情</button>`
    : '';
  
  container.innerHTML = `
    <div style="margin: 10px 0; padding: 15px; background: #13192a; border-radius: 10px;">
      <div>用户角色: <strong>${user.role}</strong></div>
      <div>用户邮箱: ${user.email}</div>
      <div>isAdmin 条件: ${isAdmin}</div>
      <div style="margin-top: 15px; padding: 10px; background: #0d1322; border-radius: 8px;">
        <strong>生成的按钮HTML:</strong>
        <pre style="background: #090e1c; padding: 10px; border-radius: 6px; margin-top: 5px; overflow: auto;">${escapeHtml(buttonHtml) || '(空 - 不显示按钮)'}</pre>
      </div>
      <div style="margin-top: 15px;">
        <strong>实际按钮:</strong>
        <div style="margin-top: 10px;">${buttonHtml || '无按钮'}</div>
      </div>
    </div>
  `;
}

// HTML转义辅助函数
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 显示调试信息
function showDebugInfo() {
  const debugDiv = document.getElementById('debug');
  const test1 = adminUser?.role === 'admin';
  const test2 = normalUser?.role === 'admin';
  
  debugDiv.innerHTML = `
    <div>测试1 (adminUser?.role === 'admin'): ${test1}</div>
    <div>测试2 (normalUser?.role === 'admin'): ${test2}</div>
    <div>adminUser.role 类型: ${typeof adminUser.role}</div>
    <div>adminUser.role 值: "${adminUser.role}"</div>
    <div>字符串比较: "${adminUser.role}" === "admin" : ${adminUser.role === 'admin'}</div>
    <div>不严格比较: "${adminUser.role}" == "admin" : ${adminUser.role == 'admin'}</div>
  `;
}

// 初始化页面
document.addEventListener('DOMContentLoaded', function() {
  testButtonGeneration(adminUser, 'adminDemo');
  testButtonGeneration(normalUser, 'userDemo');
  showDebugInfo();
});
</script>
</body>
</html>
